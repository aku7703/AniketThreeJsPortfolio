<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <title>Blog | Aniket Chaudhry</title>
  <link rel="stylesheet" href="blog.css">
</head>

<body>
  <!-- Navigation -->
  <nav id="blog-nav">
    <div class="nav-container">
      <a class="nav-logo" href="/">Aniket Chaudhry</a>
      <ul class="nav-links">
        <li><a href="/#about">About</a></li>
        <li><a href="/#projects">Projects</a></li>
        <li><a href="/blog" class="active">Blog</a></li>
        <li><a href="Resume-AniketChaudhry.pdf" class="nav-cta">Resume</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero Banner -->
  <header class="blog-hero">
    <div class="hero-content">
      <h1>Blog</h1>
      <p>Thoughts on technology, space exploration, and software engineering</p>
    </div>
  </header>

  <!-- Main Content -->
  <main class="blog-main">
    <!-- Post List View -->
    <div id="posts-list" class="posts-container">
      <div class="posts-grid">
        <!-- Posts will be loaded dynamically -->
      </div>
    </div>

    <!-- Single Post View -->
    <article id="post-view" class="article-container" style="display: none;">
      <button class="back-btn" onclick="hidePost()">
        <i class="fas fa-arrow-left"></i> All Posts
      </button>
      <div class="article-header">
        <img id="post-cover" class="article-cover" src="" alt="" style="display: none;">
        <time id="post-date" class="article-date"></time>
        <h1 id="post-title" class="article-title"></h1>
      </div>
      <div id="post-content" class="article-body">
        <!-- Content loaded dynamically -->
      </div>
      <footer class="article-footer">
        <button class="back-btn" onclick="hidePost()">
          <i class="fas fa-arrow-left"></i> Back to all posts
        </button>
      </footer>
    </article>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-content">
      <p>&copy; 2025 Aniket Chaudhry</p>
      <div class="footer-links">
        <a href="https://linkedin.com/in/aniketchaudhry" target="_blank"><i class="fab fa-linkedin"></i></a>
        <a href="https://github.com/aku7703" target="_blank"><i class="fab fa-github"></i></a>
      </div>
    </div>
  </footer>

  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    // Blog posts data (will be loaded from markdown files)
    // For static hosting, we use a manifest approach
    const postsManifest = [
      {
        slug: 'creating-portfolio-website',
        title: 'Creating My Portfolio Website!',
        date: '2024-06-19',
        excerpt: 'Learn about my journey of creating my portfolio website using new tools like Three.js and Particle.js.',
        cover: ''
      },
      {
        slug: 'university-nanosatellite-program',
        title: 'University Nanosatellite Program Kick-Off!',
        date: '2024-05-20',
        excerpt: 'I represented Northeastern University at NASA\'s Kennedy Space Center for the University Nanosatellite Program.',
        cover: ''
      }
    ];

    let currentPosts = [];

    // Format date
    function formatDate(dateString) {
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      return new Date(dateString).toLocaleDateString('en-US', options);
    }

    // Calculate read time
    function getReadTime(content) {
      const words = content.split(/\s+/).length;
      const minutes = Math.ceil(words / 200);
      return `${minutes} min read`;
    }

    // Render posts list
    function renderPostsList() {
      const grid = document.querySelector('.posts-grid');

      // Sort by date descending
      const sorted = [...postsManifest].sort((a, b) => new Date(b.date) - new Date(a.date));

      grid.innerHTML = sorted.map((post, index) => `
        <article class="post-card ${index === 0 ? 'featured' : ''}" onclick="showPost('${post.slug}')">
          ${post.cover ? `<img src="${post.cover}" alt="${post.title}" class="post-cover">` : ''}
          <div class="post-content">
            <time class="post-meta">${formatDate(post.date)}</time>
            <h2 class="post-title">${post.title}</h2>
            <p class="post-excerpt">${post.excerpt}</p>
            <span class="read-more">Read article <i class="fas fa-arrow-right"></i></span>
          </div>
        </article>
      `).join('');
    }

    // Show single post
    async function showPost(slug) {
      try {
        // Fetch the markdown file
        const response = await fetch(`/content/blog/${slug}.md`);
        const text = await response.text();

        // Parse frontmatter and content
        const parts = text.split('---');
        const frontmatter = parts[1];
        const content = parts.slice(2).join('---');

        // Extract metadata
        const meta = {};
        frontmatter.split('\n').forEach(line => {
          const [key, ...value] = line.split(':');
          if (key && value.length) {
            meta[key.trim()] = value.join(':').trim().replace(/^["']|["']$/g, '');
          }
        });

        // Render
        document.getElementById('post-title').textContent = meta.title || '';
        document.getElementById('post-date').textContent = formatDate(meta.date);

        const coverImg = document.getElementById('post-cover');
        if (meta.cover) {
          coverImg.src = meta.cover;
          coverImg.style.display = 'block';
        } else {
          coverImg.style.display = 'none';
        }

        // Render markdown content
        document.getElementById('post-content').innerHTML = marked.parse(content);

        // Switch views
        document.getElementById('posts-list').style.display = 'none';
        document.getElementById('post-view').style.display = 'block';

        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (error) {
        console.error('Error loading post:', error);
      }
    }

    // Hide post
    function hidePost() {
      document.getElementById('post-view').style.display = 'none';
      document.getElementById('posts-list').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', renderPostsList);
  </script>
</body>

</html>
