<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- AC monogram: the A's left stroke doubles as the C's spine -->
  <!-- Unified geometric mark that reads as both letters -->

  <!-- The A shape - bold, angular -->
  <polygon points="10,28 16,4 22,28 18.4,28 16,18.8 13.6,28" fill="#00ff88"/>

  <!-- A crossbar -->
  <rect x="12.2" y="19" width="7.6" height="2.8" fill="#000"/>

  <!-- C shape - wraps the right side of the A -->
  <path d="M22 8 C27.5 8 31 12.5 31 16 C31 19.5 27.5 24 22 24 L22 21 C25.5 21 28 18.5 28 16 C28 13.5 25.5 11 22 11 Z" fill="#00ff88"/>
</svg>